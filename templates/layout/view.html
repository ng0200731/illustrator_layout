<div class="tab-pane">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/customer.css') }}">
    <style>
    .viewer-highlight { border: 2px solid #000 !important; background: #ffffcc !important; }
    </style>

    <div class="table-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Layouts</h2>
            <button class="btn btn-primary" onclick="loadLayouts()">Refresh List</button>
        </div>
        <div id="message" style="display: none;"></div>
        <div style="margin-bottom: 12px; display: flex; gap: 8px;">
            <button class="btn btn-secondary" onclick="selectAllLayouts()">Select All</button>
            <button class="btn btn-danger" id="btn-delete-selected" onclick="deleteSelectedLayouts()" disabled>Delete Selected</button>
        </div>
        <table id="layoutTable">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="select-all-checkbox" onchange="toggleSelectAll(this)"></th>
                    <th>Layout ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Customer</th>
                    <th>Variables</th>
                    <th>Created</th>
                    <th>Last Updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="layoutTableBody">
                <tr>
                    <td colspan="9" style="text-align: center; padding: 40px;">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Matching JSON Viewer Modal -->
    <div id="matching-viewer-modal" style="display:none;position:fixed;z-index:10000;background:#fff;border:1px solid #000;box-shadow:0 4px 20px rgba(0,0,0,0.3);border-radius:6px;width:680px;max-height:90vh;font-family:inherit;">
        <div id="matching-viewer-header" style="padding:8px 12px;background:#000;color:#fff;cursor:move;display:flex;justify-content:space-between;align-items:center;border-radius:6px 6px 0 0;user-select:none;">
            <span style="font-size:12px;font-weight:600;">MATCHING JSON</span>
            <button id="btn-close-matching-viewer" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:0 2px;">&times;</button>
        </div>
        <!-- Toolbar -->
        <div style="display:flex;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid #ddd;">
            <label style="font-size:11px;white-space:nowrap;">Label Type:</label>
            <span id="matching-viewer-label-type" style="padding:4px 8px;font-size:11px;background:#f5f5f5;border:1px solid #ddd;border-radius:3px;">—</span>
            <span style="flex:1;"></span>
            <span id="matching-viewer-layout-name" style="font-size:11px;color:#666;"></span>
        </div>
        <!-- Left / Right split body -->
        <div style="display:flex;min-height:300px;max-height:calc(90vh - 120px);">
            <!-- Left: Overlays -->
            <div style="flex:1;border-right:1px solid #ddd;display:flex;flex-direction:column;">
                <div style="padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:#f5f5f5;border-bottom:1px solid #ddd;">JSON Overlays</div>
                <div id="matching-viewer-overlay-list" style="flex:1;overflow-y:auto;padding:6px;">
                    <div style="font-size:10px;color:#999;padding:6px;">No matching data</div>
                </div>
            </div>
            <!-- Right: Field cards -->
            <div style="flex:1;display:flex;flex-direction:column;">
                <div style="padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:#f5f5f5;border-bottom:1px solid #ddd;">Field Mappings</div>
                <div id="matching-viewer-fields-container" style="flex:1;overflow-y:auto;padding:6px;">
                    <div style="font-size:10px;color:#999;padding:6px;">No field mappings</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load layout.js and then call loadLayouts
        (function() {
            // Check if script already loaded
            if (typeof loadLayouts === 'function') {
                loadLayouts();
                return;
            }

            var script = document.createElement('script');
            script.src = "{{ url_for('static', filename='js/layout.js') }}";
            script.onload = function() {
                console.log('layout.js loaded');
                if (typeof loadLayouts === 'function') {
                    loadLayouts();
                } else {
                    console.error('loadLayouts function not found after script load');
                }
            };
            script.onerror = function() {
                console.error('Failed to load layout.js');
            };
            document.body.appendChild(script);
        })();
    </script>
</div>
