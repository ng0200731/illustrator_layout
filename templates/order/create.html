<div class="tab-pane">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/order.css') }}">

    <div class="order-create">
        <h2>Create Order</h2>

        <div class="form-section">
            <div class="form-row">
                <label>Customer</label>
                <select id="order-customer" onchange="onCustomerChange()">
                    <option value="">-- Select customer --</option>
                </select>
            </div>
            <div id="layout-name-display" style="display:none;margin-top:8px;padding:6px 8px;background:#f9f9f9;border:1px solid #ddd;font-size:11px;color:#444;">
                <strong>Layout:</strong> <span id="layout-name-text"></span>
            </div>
        </div>

        <div id="order-lines"></div>

        <div id="excel-section" class="form-section" style="display:none;">
            <h3>Excel Import</h3>
            <div class="excel-actions">
                <button onclick="downloadTemplate()" class="btn-excel">Download Template</button>
                <button onclick="downloadDummy()" class="btn-excel">Download Dummy</button>
                <input type="number" id="dummy-rows" min="1" value="10" style="width:50px;padding:3px 6px;border:1px solid #000;font-size:10px;text-align:center;"> rows
            </div>
            <div class="excel-upload-area" id="excel-upload-area">
                <p>Drop .xlsx file here to import order lines</p>
                <p>or</p>
                <button onclick="document.getElementById('excel-input').click()" class="btn-excel">Choose File</button>
            </div>
            <input type="file" id="excel-input" accept=".xlsx" style="display:none;" onchange="handleExcelUpload(this)">
            <div id="excel-error" class="error" style="display:none;"></div>
            <div id="excel-success" class="success" style="display:none;"></div>
        </div>

        <div class="form-section" id="layout-section" style="display:none;">
            <h3>Select Layout</h3>
            <table class="layout-search-table" id="layout-table">
                <thead>
                    <tr>
                        <th><input type="text" id="filter-name" placeholder="Search name..." oninput="filterLayouts()"></th>
                        <th>Created</th>
                        <th># Vars</th>
                    </tr>
                </thead>
                <tbody id="layout-tbody"></tbody>
            </table>
            <div id="no-layouts-msg" class="no-vars" style="display:none;">No layouts found</div>
        </div>

        <div class="form-actions" id="submit-section" style="display:none;">
            <button onclick="showPoModal()" class="btn-primary">Create Order</button>
        </div>
        <div id="order-result"></div>
    </div>

    <!-- PO# Modal -->
    <div id="po-modal" class="preview-modal-overlay" onclick="closePoModal(event)">
        <div class="po-modal-content">
            <div class="preview-modal-header">
                <span>Order Details</span>
                <button class="preview-modal-close" onclick="closePoModal()">&times;</button>
            </div>
            <div class="po-modal-body">
                <div class="form-row">
                    <label>PO #</label>
                    <input type="text" id="po-input" placeholder="Purchase order number">
                    <button onclick="autoGeneratePo()" class="btn-auto-po">Auto</button>
                </div>
                <div class="form-actions" style="margin-top:12px;">
                    <button onclick="confirmOrder()" class="btn-primary">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    var availableLayouts = [];
    var orderLinesList = []; // [{layout_id, layoutName, variableValues:{}}]
    var currentCustomerId = '';
    var currentCustomerName = '';
    var currentLayoutVars = [];
    var currentLayoutName = '';
    var editOrderId = null;
    var editPoNumber = '';

    (function init() {
        // Check if we're in edit mode
        // First try URL params, then check if parent has the info
        var urlParams = new URLSearchParams(window.location.search);
        editOrderId = urlParams.get('edit');

        // If not in URL params, check if we're in a tab and extract from tab URL
        if (!editOrderId) {
            var tabPane = document.querySelector('.tab-pane.active');
            if (tabPane && tabPane.id) {
                // Find the tab data from sessionStorage
                var savedTabs = sessionStorage.getItem('tabs');
                if (savedTabs) {
                    var tabs = JSON.parse(savedTabs);
                    var currentTab = tabs.find(function(t) { return t.id + '-content' === tabPane.id; });
                    if (currentTab && currentTab.url) {
                        var match = currentTab.url.match(/[?&]edit=([^&]+)/);
                        if (match) {
                            editOrderId = match[1];
                        }
                    }
                }
            }
        }

        console.log('Edit Order ID:', editOrderId);

        fetch('/customer/list')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var customers = data.customers || [];
                var sel = document.getElementById('order-customer');
                customers.forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c.customer_id;
                    opt.textContent = c.company_name;
                    opt.dataset.name = c.company_name;
                    sel.appendChild(opt);
                });

                // If edit mode, load the order
                if (editOrderId) {
                    loadOrderForEdit(editOrderId);
                }
            });
    })();

    function loadOrderForEdit(orderId) {
        console.log('Loading order for edit:', orderId);
        fetch('/order/api/' + orderId)
            .then(function(r) {
                console.log('Order API response status:', r.status);
                return r.json();
            })
            .then(function(data) {
                console.log('Order data:', data);
                var order = data.order;
                var lines = data.lines;

                if (!order) {
                    alert('Order not found');
                    return;
                }

                // Store PO number
                editPoNumber = order.po_number;

                // Set customer
                var sel = document.getElementById('order-customer');
                sel.value = order.customer_id;
                currentCustomerId = order.customer_id;
                currentCustomerName = order.company_name;
                console.log('Set customer:', currentCustomerId, currentCustomerName);

                // Load layouts for this customer
                fetch('/order/api/layouts/' + order.customer_id)
                    .then(function(r) {
                        console.log('Layouts API response status:', r.status);
                        return r.json();
                    })
                    .then(function(layouts) {
                        console.log('Layouts:', layouts.length);
                        availableLayouts = layouts;

                        if (lines.length > 0) {
                            var firstLine = lines[0];
                            var layout = layouts.find(function(l) { return l.id === firstLine.layout_id; });
                            console.log('Found layout:', layout ? layout.name : 'NOT FOUND');

                            if (layout) {
                                // Parse layout data for variables
                                var data = layout.data ? (typeof layout.data === 'string' ? JSON.parse(layout.data) : layout.data) : {};
                                var comps = data.components || [];
                                var vars = [];
                                comps.forEach(function(c, ci) {
                                    if (!c.isVariable) return;
                                    vars.push({
                                        idx: ci,
                                        content: c.content || '',
                                        variableName: c.variableName || '',
                                        fontFamily: c.fontFamily || '',
                                        fontSize: c.fontSize || 12
                                    });
                                });
                                console.log('Variables:', vars.length);

                                currentLayoutVars = vars;
                                currentLayoutName = layout.name;

                                // Load all lines
                                orderLinesList = [];
                                lines.forEach(function(line) {
                                    var varValues = line.variable_values ? JSON.parse(line.variable_values) : {};
                                    orderLinesList.push({
                                        layout_id: firstLine.layout_id,
                                        layoutName: layout.name,
                                        vars: vars,
                                        variableValues: varValues,
                                        quantity: line.quantity
                                    });
                                });
                                console.log('Order lines:', orderLinesList.length);

                                // Render the form
                                renderOrderLines();
                                showSection('submit-section');
                                if (vars.length > 0) {
                                    showSection('excel-section');
                                }

                                // Update the header and button text
                                document.querySelector('.order-create h2').textContent = 'Edit Order (' + orderId + ')';
                                document.querySelector('#submit-section .btn-primary').textContent = 'Update Order';
                                console.log('Edit mode setup complete');
                            }
                        }
                    })
                    .catch(function(err) {
                        console.error('Layouts API error:', err);
                        alert('Failed to load layouts: ' + err.message);
                    });
            })
            .catch(function(err) {
                console.error('Order API error:', err);
                alert('Failed to load order: ' + err.message);
            });
    }

    function onCustomerChange() {
        var sel = document.getElementById('order-customer');
        currentCustomerId = sel.value;
        currentCustomerName = sel.selectedIndex > 0 ? sel.options[sel.selectedIndex].dataset.name : '';
        availableLayouts = [];
        orderLinesList = [];
        document.getElementById('order-lines').innerHTML = '';
        document.getElementById('filter-name').value = '';
        hideSection('layout-section');
        hideSection('submit-section');
        hideSection('excel-section');
        currentLayoutVars = [];
        currentLayoutName = '';
        document.getElementById('order-result').innerHTML = '';
        if (!currentCustomerId) return;

        fetch('/order/api/layouts/' + currentCustomerId)
            .then(function(r) { return r.json(); })
            .then(function(layouts) {
                availableLayouts = layouts;
                showSection('layout-section');
                if (layouts.length === 0) {
                    document.getElementById('no-layouts-msg').style.display = '';
                    document.getElementById('layout-table').style.display = 'none';
                } else {
                    document.getElementById('no-layouts-msg').style.display = 'none';
                    document.getElementById('layout-table').style.display = '';
                    renderLayoutTable(layouts);
                }
            });
    }
    function renderLayoutTable(layouts) {
        var tbody = document.getElementById('layout-tbody');
        tbody.innerHTML = '';
        layouts.forEach(function(l) {
            var tr = document.createElement('tr');
            tr.className = 'layout-row';
            tr.dataset.layoutId = l.id;
            tr.onclick = function() { selectLayout(l.id); };
            var created = l.created_at ? l.created_at.substring(0, 10) : '-';
            tr.innerHTML =
                '<td>' + escHtml(l.name) + '</td>' +
                '<td>' + created + '</td>' +
                '<td>' + (l.var_count || 0) + '</td>';
            tbody.appendChild(tr);
        });
    }

    function filterLayouts() {
        var q = document.getElementById('filter-name').value.toLowerCase();
        var filtered = availableLayouts.filter(function(l) {
            return l.name.toLowerCase().indexOf(q) !== -1;
        });
        renderLayoutTable(filtered);
    }

    function selectLayout(layoutId) {
        var layout = null;
        for (var i = 0; i < availableLayouts.length; i++) {
            if (availableLayouts[i].id === layoutId) { layout = availableLayouts[i]; break; }
        }
        if (!layout) return;

        // Parse layout data for variables
        var data = layout.data ? (typeof layout.data === 'string' ? JSON.parse(layout.data) : layout.data) : {};
        var comps = data.components || [];
        var vars = [];
        comps.forEach(function(c, ci) {
            if (!c.isVariable) return;
            vars.push({
                idx: ci,
                content: c.content || '',
                variableName: c.variableName || '',
                fontFamily: c.fontFamily || '',
                fontSize: c.fontSize || 12
            });
        });

        // Add to orderLinesList
        var lineObj = { layout_id: layoutId, layoutName: layout.name, vars: vars, variableValues: {} };
        // Pre-fill variable values with original content
        vars.forEach(function(v) { lineObj.variableValues[v.idx] = v.content; });
        orderLinesList.push(lineObj);

        currentLayoutVars = vars;
        currentLayoutName = layout.name;

        // Collapse layout table, render line cards
        hideSection('layout-section');
        renderOrderLines();
        showSection('submit-section');
        if (vars.length > 0) {
            showSection('excel-section');
            document.getElementById('excel-error').style.display = 'none';
            document.getElementById('excel-success').style.display = 'none';
        }
    }
    function renderOrderLines() {
        var container = document.getElementById('order-lines');
        container.innerHTML = '';

        // Show layout name at the top
        if (orderLinesList.length > 0) {
            document.getElementById('layout-name-display').style.display = '';
            document.getElementById('layout-name-text').textContent = orderLinesList[0].layoutName;
        } else {
            document.getElementById('layout-name-display').style.display = 'none';
            return;
        }

        if (orderLinesList.length === 0) return;

        var vars = orderLinesList[0].vars;
        if (vars.length === 0) {
            container.innerHTML = '<div class="no-vars">No variable fields</div>';
            return;
        }

        // Create SET #1 header
        var setHeader = document.createElement('div');
        setHeader.style.cssText = 'margin:16px 0 8px 0;padding:8px;background:#000;color:#fff;font-size:11px;font-weight:600;text-align:center;';
        setHeader.textContent = 'SET #1';
        container.appendChild(setHeader);

        // Create table
        var table = document.createElement('table');
        table.style.cssText = 'width:100%;border-collapse:collapse;font-size:10px;';

        // Create header row
        var thead = document.createElement('thead');
        var headerRow = document.createElement('tr');

        // # column
        var thNum = document.createElement('th');
        thNum.textContent = '#';
        thNum.style.cssText = 'border:1px solid #000;padding:4px;background:#f0f0f0;width:30px;text-align:center;color:#000;';
        headerRow.appendChild(thNum);

        // Variable columns
        vars.forEach(function(v) {
            var th = document.createElement('th');
            th.textContent = v.variableName || ('#' + (vars.indexOf(v) + 1));
            th.style.cssText = 'border:1px solid #000;padding:4px;background:#f0f0f0;min-width:100px;color:#000;';
            headerRow.appendChild(th);
        });

        // qty column
        var thQty = document.createElement('th');
        thQty.textContent = 'qty';
        thQty.style.cssText = 'border:1px solid #000;padding:4px;background:#f0f0f0;width:60px;color:#000;';
        headerRow.appendChild(thQty);

        // Actions column
        var thActions = document.createElement('th');
        thActions.textContent = 'Actions';
        thActions.style.cssText = 'border:1px solid #000;padding:4px;background:#f0f0f0;width:80px;color:#000;';
        headerRow.appendChild(thActions);

        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Create tbody
        var tbody = document.createElement('tbody');

        orderLinesList.forEach(function(line, li) {
            var tr = document.createElement('tr');

            // Sequence number
            var tdNum = document.createElement('td');
            tdNum.textContent = li + 1;
            tdNum.style.cssText = 'border:1px solid #000;padding:4px;text-align:center;background:#f9f9f9;';
            tr.appendChild(tdNum);

            // Variable inputs
            line.vars.forEach(function(v) {
                var td = document.createElement('td');
                td.style.cssText = 'border:1px solid #000;padding:2px;';

                var textarea = document.createElement('textarea');
                textarea.value = line.variableValues[v.idx] || '';
                textarea.placeholder = v.content;
                textarea.rows = 2;
                textarea.style.cssText = 'width:100%;border:none;padding:4px;font-size:10px;font-family:inherit;resize:vertical;box-sizing:border-box;';
                textarea.dataset.line = li;
                textarea.dataset.idx = v.idx;
                textarea.oninput = function() {
                    onVarInput(this);
                    updateRowButtons(li);
                };

                td.appendChild(textarea);
                tr.appendChild(td);
            });

            // Quantity input
            var tdQty = document.createElement('td');
            tdQty.style.cssText = 'border:1px solid #000;padding:2px;';

            var qtyInput = document.createElement('input');
            qtyInput.type = 'text';
            qtyInput.inputMode = 'numeric';
            qtyInput.pattern = '[0-9]*';
            qtyInput.value = line.quantity && line.quantity > 0 ? line.quantity : '';
            qtyInput.placeholder = '1';
            qtyInput.style.cssText = 'width:100%;border:none;padding:4px;font-size:10px;text-align:center;box-sizing:border-box;';
            qtyInput.dataset.line = li;
            qtyInput.oninput = function() {
                var lineIdx = parseInt(this.dataset.line);
                var val = parseInt(this.value);
                orderLinesList[lineIdx].quantity = isNaN(val) ? 0 : val;
                updateRowButtons(lineIdx);
            };

            tdQty.appendChild(qtyInput);
            tr.appendChild(tdQty);

            // Actions
            var tdActions = document.createElement('td');
            tdActions.style.cssText = 'border:1px solid #000;padding:4px;text-align:center;';
            tdActions.id = 'actions-' + li;

            tr.appendChild(tdActions);
            tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        container.appendChild(table);

        // Update all row buttons
        orderLinesList.forEach(function(line, li) {
            updateRowButtons(li);
        });
    }

    function updateRowButtons(lineIndex) {
        var actionsCell = document.getElementById('actions-' + lineIndex);
        if (!actionsCell) return;

        var isComplete = checkRowComplete(lineIndex);
        var isLastRow = lineIndex === orderLinesList.length - 1;

        actionsCell.innerHTML = '';

        // Show duplicate button if row is complete
        if (isComplete) {
            var dupBtn = document.createElement('button');
            dupBtn.textContent = '[⎘]';
            dupBtn.title = 'Duplicate this row';
            dupBtn.style.cssText = 'padding:2px 8px;margin:0 2px;border:1px solid #000;background:#fff;cursor:pointer;font-size:10px;';
            dupBtn.onclick = function() { duplicateLine(lineIndex); };
            actionsCell.appendChild(dupBtn);
        }

        // Show [-] button if not the only row
        if (orderLinesList.length > 1) {
            var removeBtn = document.createElement('button');
            removeBtn.textContent = '[-]';
            removeBtn.style.cssText = 'padding:2px 8px;margin:0 2px;border:1px solid #c00;background:#fff;color:#c00;cursor:pointer;font-size:10px;';
            removeBtn.onclick = function() { removeLine(lineIndex); };
            actionsCell.appendChild(removeBtn);
        }

        // Show [+] button only if row is complete and it's the last row
        if (isComplete && isLastRow) {
            var addBtn = document.createElement('button');
            addBtn.textContent = '[+]';
            addBtn.style.cssText = 'padding:2px 8px;margin:0 2px;border:1px solid #000;background:#fff;cursor:pointer;font-size:10px;';
            addBtn.onclick = addVariableSet;
            actionsCell.appendChild(addBtn);
        }
    }

    function checkRowComplete(lineIndex) {
        var line = orderLinesList[lineIndex];

        // Check quantity
        if (!line.quantity || line.quantity < 1) return false;

        // Check all variables are filled
        for (var i = 0; i < line.vars.length; i++) {
            var v = line.vars[i];
            var value = line.variableValues[v.idx];
            if (!value || value.trim() === '') return false;
        }

        return true;
    }

    function duplicateLine(lineIndex) {
        var src = orderLinesList[lineIndex];
        var lineObj = {
            layout_id: src.layout_id,
            layoutName: src.layoutName,
            vars: src.vars,
            variableValues: {},
            quantity: src.quantity
        };
        // Copy all variable values
        for (var key in src.variableValues) {
            lineObj.variableValues[key] = src.variableValues[key];
        }
        // Insert after the current line
        orderLinesList.splice(lineIndex + 1, 0, lineObj);
        renderOrderLines();
    }

    function addVariableSet() {
        if (orderLinesList.length === 0) return;
        // Copy structure from first set with empty values
        var src = orderLinesList[0];
        var lineObj = {
            layout_id: src.layout_id,
            layoutName: src.layoutName,
            vars: src.vars,
            variableValues: {},
            quantity: 0
        };
        // Leave variableValues empty for new row
        orderLinesList.push(lineObj);
        renderOrderLines();
    }

    function onVarInput(el) {
        var li = parseInt(el.dataset.line);
        var idx = el.dataset.idx;
        orderLinesList[li].variableValues[idx] = el.value;
    }

    function addAnotherLayout() {
        document.getElementById('filter-name').value = '';
        renderLayoutTable(availableLayouts);
        showSection('layout-section');
    }

    function removeLine(li) {
        orderLinesList.splice(li, 1);
        renderOrderLines();
        if (orderLinesList.length === 0) {
            hideSection('submit-section');
            hideSection('excel-section');
            addAnotherLayout();
        }
    }
    function showPoModal() {
        if (orderLinesList.length === 0) { alert('Add at least one layout.'); return; }
        // Pre-fill PO number if editing
        document.getElementById('po-input').value = editPoNumber || '';
        document.getElementById('po-modal').classList.add('active');
    }

    function closePoModal(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('po-modal').classList.remove('active');
    }

    function autoGeneratePo() {
        var now = new Date();
        var pad = function(n) { return String(n).padStart(2, '0'); };
        var ts = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
            '_' + pad(now.getHours()) + '_' + pad(now.getMinutes()) + '_' + pad(now.getSeconds());
        var layoutName = orderLinesList.length > 0 ? orderLinesList[0].layoutName : '';
        var po = ts + '_' + currentCustomerName + '_' + layoutName;
        document.getElementById('po-input').value = po;
    }

    function confirmOrder() {
        var poNumber = document.getElementById('po-input').value.trim();
        if (!poNumber) { alert('Enter a PO number or click Auto.'); return; }

        var lines = orderLinesList.map(function(line) {
            var vv = {};
            var hasVals = false;
            for (var k in line.variableValues) {
                if (line.variableValues[k]) { vv[k] = line.variableValues[k]; hasVals = true; }
            }
            return {
                layout_id: line.layout_id,
                quantity: line.quantity || 1,
                variable_values: hasVals ? vv : null
            };
        });

        var apiUrl = editOrderId ? '/order/api/' + editOrderId : '/order/api/create';
        var method = editOrderId ? 'PUT' : 'POST';

        fetch(apiUrl, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ customer_id: currentCustomerId, po_number: poNumber, lines: lines })
        })
        .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
        .then(function(res) {
            closePoModal();
            if (res.ok) {
                openTab('Orders', '/order/view');
            } else {
                document.getElementById('order-result').innerHTML = '<p class="error">' + res.data.error + '</p>';
            }
        });
    }

    function viewOrder(orderId) {
        openTab('Order (' + orderId + ')', '/order/detail/' + orderId);
    }

    function createNewOrder() {
        document.getElementById('order-customer').value = '';
        document.getElementById('order-result').innerHTML = '';
        orderLinesList = [];
        availableLayouts = [];
        onCustomerChange();
    }

    function showSection(id) { document.getElementById(id).style.display = ''; }
    function hideSection(id) { document.getElementById(id).style.display = 'none'; }
    function escHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function downloadTemplate() {
        if (currentLayoutVars.length === 0) return;
        fetch('/order/api/excel/template', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                variables: currentLayoutVars.map(function(v) { return { idx: v.idx, content: v.content }; }),
                layout_name: currentLayoutName
            })
        })
        .then(function(r) {
            if (!r.ok) throw new Error('Download failed');
            return r.blob();
        })
        .then(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = currentLayoutName + '_template.xlsx';
            a.click();
            URL.revokeObjectURL(a.href);
        })
        .catch(function(err) { alert(err.message); });
    }

    function downloadDummy() {
        if (currentLayoutVars.length === 0) return;
        var rowCount = parseInt(document.getElementById('dummy-rows').value) || 10;
        fetch('/order/api/excel/dummy', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                variables: currentLayoutVars.map(function(v) { return { idx: v.idx, content: v.content }; }),
                layout_name: currentLayoutName,
                row_count: rowCount
            })
        })
        .then(function(r) {
            if (!r.ok) throw new Error('Download failed');
            return r.blob();
        })
        .then(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = currentLayoutName + '_dummy.xlsx';
            a.click();
            URL.revokeObjectURL(a.href);
        })
        .catch(function(err) { alert(err.message); });
    }

    function handleExcelUpload(input) {
        var file = input.files[0];
        if (!file) return;

        var errDiv = document.getElementById('excel-error');
        var successDiv = document.getElementById('excel-success');
        errDiv.style.display = 'none';
        successDiv.style.display = 'none';

        var formData = new FormData();
        formData.append('file', file);
        formData.append('variables', JSON.stringify(
            currentLayoutVars.map(function(v) { return { idx: v.idx, content: v.content }; })
        ));

        fetch('/order/api/excel/upload', {
            method: 'POST',
            body: formData
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                var src = orderLinesList[0];
                orderLinesList = [];
                data.rows.forEach(function(row) {
                    orderLinesList.push({
                        layout_id: src.layout_id,
                        layoutName: src.layoutName,
                        vars: src.vars,
                        variableValues: row.variableValues || row,
                        quantity: row.quantity || 1
                    });
                });
                renderOrderLines();
                showSection('submit-section');
                successDiv.textContent = data.rows.length + ' order lines imported';
                successDiv.style.display = '';
            } else {
                errDiv.textContent = data.error;
                errDiv.style.display = '';
            }
        })
        .catch(function(err) {
            errDiv.textContent = 'Upload failed: ' + err.message;
            errDiv.style.display = '';
        });

        input.value = '';
    }

    (function initExcelDragDrop() {
        setTimeout(function() {
            var area = document.getElementById('excel-upload-area');
            if (!area) return;
            area.addEventListener('dragover', function(e) {
                e.preventDefault();
                area.classList.add('dragover');
            });
            area.addEventListener('dragleave', function(e) {
                e.preventDefault();
                area.classList.remove('dragover');
            });
            area.addEventListener('drop', function(e) {
                e.preventDefault();
                area.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    var input = document.getElementById('excel-input');
                    var dt = new DataTransfer();
                    dt.items.add(e.dataTransfer.files[0]);
                    input.files = dt.files;
                    handleExcelUpload(input);
                }
            });
        }, 200);
    })();
    </script>
</div>
