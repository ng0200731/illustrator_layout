<div class="tab-pane">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/order.css') }}">
    <div class="order-json">
        <h1>Import JSONL Data</h1>

        <!-- File Upload Area -->
        <div class="form-section">
            <h2>Upload JSONL File</h2>
            <div id="jsonl-upload-area" class="jsonl-upload-area">
                <p>Drag JSONL file here or click to browse</p>
                <input type="file" id="jsonl-file-input" accept=".jsonl,.json" style="display:none">
            </div>
            <div id="jsonl-upload-message" style="margin-top: 10px; display: none;"></div>
        </div>

        <!-- Results Display Area -->
        <div id="jsonl-results" class="form-section" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <h2 style="margin:0;">Matched Data</h2>
                <div style="display:flex;gap:6px;">
                    <button id="btn-map-overlays" class="btn-primary" style="display:none;">Map to Overlays</button>
                    <button id="btn-matching-json" class="btn-primary" style="display:none;">MATCHING JSON</button>
                </div>
            </div>
            <div id="jsonl-table-container"></div>
        </div>
    </div>

    <!-- Overlay Mapping Modal (legacy) -->
    <div id="overlay-mapping-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content" style="max-width: 800px;">
            <h2>Map Fields to Overlays</h2>
            <div id="mapping-fields-container"></div>
            <div class="modal-buttons">
                <button type="button" class="btn-secondary" onclick="closeMappingModal()">Cancel</button>
                <button type="button" class="btn-primary" onclick="saveMappings()">Save Mappings</button>
            </div>
        </div>
    </div>

    <!-- Matching JSON Draggable Modal -->
    <div id="matching-json-modal" style="display:none;position:fixed;z-index:10000;background:#fff;border:1px solid #000;box-shadow:0 4px 20px rgba(0,0,0,0.3);border-radius:6px;width:680px;max-height:90vh;font-family:inherit;">
        <div id="matching-modal-header" style="padding:8px 12px;background:#000;color:#fff;cursor:move;display:flex;justify-content:space-between;align-items:center;border-radius:6px 6px 0 0;user-select:none;">
            <span style="font-size:12px;font-weight:600;">MATCHING JSON</span>
            <button id="btn-close-matching-modal" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:0 2px;">&times;</button>
        </div>
        <!-- Toolbar -->
        <div style="display:flex;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid #ddd;">
            <label style="font-size:11px;white-space:nowrap;">Label Type:</label>
            <select id="matching-label-type" style="flex:1;padding:4px;font-size:11px;">
                <option value="">Select label type...</option>
                <option value="GI001BAW">GI001BAW</option>
                <option value="GI000PRO">GI000PRO</option>
                <option value="ADHEDIST">ADHEDIST</option>
                <option value="PVP002XG">PVP002XG</option>
            </select>
        </div>
        <!-- Left / Right split body -->
        <div style="display:flex;min-height:300px;max-height:calc(90vh - 120px);">
            <!-- Left: Overlays -->
            <div style="flex:1;border-right:1px solid #ddd;display:flex;flex-direction:column;">
                <div style="padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:#f5f5f5;border-bottom:1px solid #ddd;">JSON Overlays</div>
                <div id="matching-overlay-list" style="flex:1;overflow-y:auto;padding:6px;">
                    <div style="font-size:10px;color:#999;padding:6px;">No overlays yet</div>
                </div>
            </div>
            <!-- Right: Field cards -->
            <div style="flex:1;display:flex;flex-direction:column;">
                <div style="padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:#f5f5f5;border-bottom:1px solid #ddd;">Field Mappings</div>
                <div id="matching-fields-container" style="flex:1;overflow-y:auto;padding:6px;">
                    <div style="font-size:10px;color:#999;padding:6px;">Select a label type to see fields</div>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <div style="display:flex;gap:6px;padding:8px 10px;border-top:1px solid #ddd;">
            <button id="btn-reset-matching" style="flex:1;padding:6px;font-size:11px;">Reset</button>
            <button id="btn-save-matching" style="flex:1;padding:6px;font-size:11px;" disabled>Save</button>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" style="display:none;position:fixed;z-index:10000;background:#fff;border:1px solid #000;box-shadow:0 4px 20px rgba(0,0,0,0.3);border-radius:6px;top:30px;right:20px;font-family:inherit;">
        <div id="preview-modal-header" style="padding:8px 12px;background:#000;color:#fff;cursor:move;display:flex;justify-content:space-between;align-items:center;border-radius:6px 6px 0 0;user-select:none;">
            <span style="font-size:12px;font-weight:600;">PREVIEW — Row #<span id="preview-row-num"></span></span>
            <button id="btn-close-preview-modal" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;padding:0 2px;">&times;</button>
        </div>
        <div id="preview-modal-body" style="padding:10px;overflow:auto;max-height:calc(100vh - 80px);">
            <canvas id="preview-canvas" style="display:block;"></canvas>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/xlsx.full.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/order_jsonl.js') }}"></script>
</div>
