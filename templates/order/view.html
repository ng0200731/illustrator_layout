<div class="tab-pane">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/order.css') }}">

    <div class="order-view">
        <h2>Orders</h2>
        <div style="display:flex; gap:6px; margin-bottom:8px;">
            <button onclick="refreshOrders()" style="padding:3px 10px;border:1px solid #000;background:#fff;cursor:pointer;font-size:10px;">Refresh</button>
            <button onclick="selectAll()" style="padding:3px 10px;border:1px solid #000;background:#fff;cursor:pointer;font-size:10px;">Select All</button>
            <button onclick="deleteSelected()" style="padding:3px 10px;border:1px solid #c00;background:#fff;color:#c00;cursor:pointer;font-size:10px;">Delete Selected</button>
            <button onclick="exportAllSelected(false)" style="padding:3px 10px;border:1px solid #000;background:#fff;cursor:pointer;font-size:10px;">AI E All</button>
            <button onclick="exportAllSelected(true)" style="padding:3px 10px;border:1px solid #000;background:#fff;cursor:pointer;font-size:10px;">AI O All</button>
        </div>
        <table id="orders-table" class="layout-search-table">
            <thead>
                <tr>
                    <th style="width:30px;"><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>
                    <th><input type="text" placeholder="Order ID..." oninput="filterOrders()"></th>
                    <th><input type="text" placeholder="Customer..." oninput="filterOrders()"></th>
                    <th><input type="text" placeholder="PO #..." oninput="filterOrders()"></th>
                    <th><input type="text" placeholder="Status..." oninput="filterOrders()"></th>
                    <th><input type="text" placeholder="Created..." oninput="filterOrders()"></th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="empty-orders" style="display:none;" class="empty-message">No orders found</div>
    </div>

    <!-- Loading overlay -->
    <div id="export-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:9999;justify-content:center;align-items:center;">
        <div style="background:#fff;border:1px solid #000;padding:20px 32px;font-size:12px;text-align:center;">
            <div class="spinner"></div>
            <div id="export-status" style="margin-top:10px;">Exporting...</div>
        </div>
    </div>

    <script>
    var allOrders = [];
    var orderDetailCache = {};

    function showExportOverlay(msg) {
        var el = document.getElementById('export-overlay');
        el.style.display = 'flex';
        document.getElementById('export-status').textContent = msg || 'Exporting...';
    }
    function hideExportOverlay() {
        document.getElementById('export-overlay').style.display = 'none';
    }

    (function() {
        refreshOrders();
    })();

    function refreshOrders() {
        fetch('/order/api/list')
            .then(function(r) { return r.json(); })
            .then(function(orders) {
                allOrders = orders;
                document.getElementById('orders-table').style.display = '';
                document.getElementById('empty-orders').style.display = 'none';
                if (orders.length === 0) {
                    document.getElementById('orders-table').style.display = 'none';
                    document.getElementById('empty-orders').style.display = 'block';
                    return;
                }
                renderOrders(orders);
            });
    }

    function renderOrders(orders) {
        var tbody = document.querySelector('#orders-table tbody');
        tbody.innerHTML = '';
        orders.forEach(function(o) {
            var tr = document.createElement('tr');
            tr.innerHTML =
                '<td><input type="checkbox" class="order-check" value="' + o.order_id + '"></td>' +
                '<td>' + o.order_id + '</td>' +
                '<td>' + o.company_name + '</td>' +
                '<td>' + o.po_number + '</td>' +
                '<td>' + o.status + '</td>' +
                '<td>' + o.created_at + '</td>' +
                '<td style="white-space:nowrap;">' +
                    '<button onclick="exportOrder(\'' + o.order_id + '\', false)">AI E</button> ' +
                    '<button onclick="exportOrder(\'' + o.order_id + '\', true)">AI O</button> ' +
                    '<button onclick="confirmOrder(\'' + o.order_id + '\')">Confirm</button> ' +
                    '<button onclick="openTab(\'Order (' + o.order_id + ')\', \'/order/detail/' + o.order_id + '\')">View</button> ' +
                    '<button style="border-color:#c00;color:#c00;" onclick="deleteSingle(\'' + o.order_id + '\')">Del</button>' +
                '</td>';
            tbody.appendChild(tr);
        });
    }

    function filterOrders() {
        var inputs = document.querySelectorAll('#orders-table thead input[type="text"]');
        var filters = [];
        inputs.forEach(function(inp) { filters.push(inp.value.toLowerCase()); });

        var filtered = allOrders.filter(function(o) {
            var vals = [o.order_id, o.company_name, o.po_number, o.status, o.created_at];
            for (var i = 0; i < filters.length; i++) {
                if (filters[i] && vals[i].toLowerCase().indexOf(filters[i]) === -1) return false;
            }
            return true;
        });
        renderOrders(filtered);
    }

    function toggleAll(el) {
        var checks = document.querySelectorAll('.order-check');
        checks.forEach(function(c) { c.checked = el.checked; });
    }

    function selectAll() {
        document.getElementById('check-all').checked = true;
        var checks = document.querySelectorAll('.order-check');
        checks.forEach(function(c) { c.checked = true; });
    }

    function deleteSelected() {
        var checks = document.querySelectorAll('.order-check:checked');
        var ids = [];
        checks.forEach(function(c) { ids.push(c.value); });
        if (ids.length === 0) { alert('No orders selected.'); return; }
        if (!confirm('Delete ' + ids.length + ' order(s)?')) return;
        var promises = ids.map(function(id) {
            return fetch('/order/api/' + id, { method: 'DELETE' });
        });
        Promise.all(promises).then(function() {
            allOrders = allOrders.filter(function(o) { return ids.indexOf(o.order_id) === -1; });
            renderOrders(allOrders);
            document.getElementById('check-all').checked = false;
        });
    }

    function confirmOrder(orderId) {
        if (!confirm('Confirm order ' + orderId + '?')) return;
        fetch('/order/api/' + orderId + '/confirm', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.ok) {
                    var o = allOrders.find(function(x) { return x.order_id === orderId; });
                    if (o) o.status = 'confirmed';
                    filterOrders();
                } else {
                    alert('Confirm failed: ' + (res.error || 'Unknown error'));
                }
            })
            .catch(function(err) { alert('Confirm error: ' + err.message); });
    }

    function deleteSingle(orderId) {
        if (!confirm('Delete order ' + orderId + '?')) return;
        fetch('/order/api/' + orderId, { method: 'DELETE' })
            .then(function() {
                allOrders = allOrders.filter(function(o) { return o.order_id !== orderId; });
                renderOrders(allOrders);
            });
    }

    // --- Export functions ---

    function getOrderDetail(orderId) {
        if (orderDetailCache[orderId]) {
            return Promise.resolve(orderDetailCache[orderId]);
        }
        return fetch('/order/api/' + orderId)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                orderDetailCache[orderId] = data;
                return data;
            });
    }

    function generateOrderData(orderId) {
        return fetch('/order/api/' + orderId + '/generate', { method: 'POST' })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.lines) return res.lines;
                throw new Error(res.error || 'Generate failed');
            });
    }

    function exportOrder(orderId, outlined) {
        showExportOverlay('Exporting ' + orderId + '...');
        getOrderDetail(orderId).then(function(data) {
            var lines = data.lines || [];
            // Check if lines have generated_data
            var hasGenerated = lines.length > 0 && lines[0].generated_data;
            var pagesPromise;
            if (hasGenerated) {
                var pages = [];
                lines.forEach(function(line) {
                    var genData = typeof line.generated_data === 'string' ? JSON.parse(line.generated_data) : line.generated_data;
                    if (genData && genData.exportPayload) {
                        pages.push(genData.exportPayload);
                    }
                });
                pagesPromise = Promise.resolve(pages);
            } else {
                pagesPromise = generateOrderData(orderId).then(function(genLines) {
                    var pages = [];
                    genLines.forEach(function(genData) {
                        if (genData && genData.exportPayload) {
                            pages.push(genData.exportPayload);
                        }
                    });
                    return pages;
                });
            }

            pagesPromise.then(function(pages) {
                if (pages.length === 0) {
                    hideExportOverlay();
                    alert('No data to export for ' + orderId);
                    return;
                }
                if (pages.length === 1) {
                    // Single page export
                    var payload = pages[0];
                    payload.outlined = !!outlined;
                    payload.separateInvisible = true;
                    return fetch('/export/ai', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).then(function(response) {
                        if (!response.ok) throw new Error('Export failed');
                        return response.blob();
                    }).then(function(blob) {
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = orderId + (outlined ? '_outlined' : '_editable') + '.ai';
                        a.click();
                        URL.revokeObjectURL(url);
                        hideExportOverlay();
                    });
                } else {
                    // Batch export
                    return fetch('/export/ai/batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ outlined: !!outlined, pages: pages })
                    }).then(function(response) {
                        if (!response.ok) throw new Error('Batch export failed');
                        return response.blob();
                    }).then(function(blob) {
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = orderId + (outlined ? '_outlined' : '_editable') + '.ai';
                        a.click();
                        URL.revokeObjectURL(url);
                        hideExportOverlay();
                    });
                }
            }).catch(function(err) {
                hideExportOverlay();
                alert('Export failed: ' + err.message);
            });
        }).catch(function(err) {
            hideExportOverlay();
            alert('Export failed: ' + err.message);
        });
    }

    function exportAllSelected(outlined) {
        var checks = document.querySelectorAll('.order-check:checked');
        var ids = [];
        checks.forEach(function(c) { ids.push(c.value); });
        if (ids.length === 0) { alert('No orders selected.'); return; }

        showExportOverlay('Exporting ' + ids.length + ' order(s)...');
        var idx = 0;

        function exportNext() {
            if (idx >= ids.length) {
                hideExportOverlay();
                return;
            }
            var orderId = ids[idx];
            document.getElementById('export-status').textContent = 'Exporting ' + (idx + 1) + '/' + ids.length + ' (' + orderId + ')...';

            getOrderDetail(orderId).then(function(data) {
                var lines = data.lines || [];
                var hasGenerated = lines.length > 0 && lines[0].generated_data;
                var pagesPromise;
                if (hasGenerated) {
                    var pages = [];
                    lines.forEach(function(line) {
                        var genData = typeof line.generated_data === 'string' ? JSON.parse(line.generated_data) : line.generated_data;
                        if (genData && genData.exportPayload) {
                            var payload = genData.exportPayload;
                            // Filter out invisible components
                            payload.components = payload.components.filter(function(c) { return c.visible !== false; });
                            pages.push(payload);
                        }
                    });
                    pagesPromise = Promise.resolve(pages);
                } else {
                    pagesPromise = generateOrderData(orderId).then(function(genLines) {
                        var pages = [];
                        genLines.forEach(function(genData) {
                            if (genData && genData.exportPayload) {
                                var payload = genData.exportPayload;
                                // Filter out invisible components
                                payload.components = payload.components.filter(function(c) { return c.visible !== false; });
                                pages.push(payload);
                            }
                        });
                        return pages;
                    });
                }

                return pagesPromise.then(function(pages) {
                    if (pages.length === 0) {
                        idx++;
                        return exportNext();
                    }
                    var fetchPromise;
                    if (pages.length === 1) {
                        var payload = pages[0];
                        // Filter out invisible components
                        payload.components = payload.components.filter(function(c) { return c.visible !== false; });
                        payload.outlined = !!outlined;
                        payload.separateInvisible = true;
                        fetchPromise = fetch('/export/ai', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        // Filter invisible components from all pages
                        pages.forEach(function(p) {
                            p.components = p.components.filter(function(c) { return c.visible !== false; });
                        });
                        fetchPromise = fetch('/export/ai/batch', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ outlined: !!outlined, pages: pages })
                        });
                    }
                    return fetchPromise.then(function(response) {
                        if (!response.ok) throw new Error('Export failed for ' + orderId);
                        return response.blob();
                    }).then(function(blob) {
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = orderId + (outlined ? '_outlined' : '_editable') + '.ai';
                        a.click();
                        URL.revokeObjectURL(url);
                        idx++;
                        return exportNext();
                    });
                });
            }).catch(function(err) {
                hideExportOverlay();
                alert('Export failed for ' + orderId + ': ' + err.message);
            });
        }

        exportNext();
    }
    </script>
</div>
